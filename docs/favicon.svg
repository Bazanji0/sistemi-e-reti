<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="net" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Network nodes -->
  <circle cx="10" cy="10" r="2.5" fill="url(#net)"/>
  <circle cx="22" cy="10" r="2.5" fill="url(#net)"/>
  <circle cx="16" cy="18" r="3" fill="url(#net)"/>
  <circle cx="8" cy="24" r="2" fill="url(#net)"/>
  <circle cx="24" cy="24" r="2" fill="url(#net)"/>
  <!-- Connections -->
  <line x1="10" y1="10" x2="22" y2="10" stroke="url(#net)" stroke-width="1" opacity="0.6"/>
  <line x1="10" y1="10" x2="16" y2="18" stroke="url(#net)" stroke-width="1" opacity="0.6"/>
  <line x1="22" y1="10" x2="16" y2="18" stroke="url(#net)" stroke-width="1" opacity="0.6"/>
  <line x1="16" y1="18" x2="8" y2="24" stroke="url(#net)" stroke-width="1" opacity="0.6"/>
  <line x1="16" y1="18" x2="24" y2="24" stroke="url(#net)" stroke-width="1" opacity="0.6"/>
</svg>
